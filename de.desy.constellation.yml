id: de.desy.constellation
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: Satellite
finish-args:
  - --share=network
  - --filesystem=home
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/pkgconfig
modules:
  - pypi-dependencies.json
  - name: Constellation
    buildsystem: meson
    config-opts:
      - -Dimpl_py=enabled
      - -Dbuildtype=release
      - -Dwerror=false
      - -Db_lto=true
      - -Dcxx_tools=false
      - -Dcxx_tests=disabled
      - -Dsatellite_dev_null_receiver=true
      - -Dsatellite_mattermost=true
      - -Dsatellite_random_transmitter=true
    sources:
      - type: archive
        url: https://gitlab.desy.de/constellation/constellation/-/releases/v0.8/downloads/Constellation-v0.8.tar.xz
        sha256: 5e3fab1689ae445bf5f5f470f96e19259c141ee37ae8187bea18a55b324fac1a
